# 1点あたり金額モーダル（race_bet_unit_modal）
unit_modal:
  selection_none: （選択なし）
  errors:
    session_invalid: ❌ セッションが無効です。
    bp_positive_int: ❌ bp は正の整数で入力してください。
# 買い目・サマリー内（絵文字が無いときの表記）
display:
  horse_number_fallback: "{{n}}番"
  frame_token_fallback: "枠{{raw}}"
errors:
  invalid_op: ❌ 操作が無効です。
  jra_multi_here: ❌ ここではマルチを切り替えられません。
  slip_back_invalid: ❌ 戻れません。もう一度 /boting から開き直してください。
  slip_back_stale: ❌ このメッセージは古いです。もう一度開き直してください。
  slip_back_failed: ❌ 戻れません。
  add_incomplete: ❌ 追加できません（選択が完了していません）。
  add_stale_data: ❌ 購入予定データが古いか不完全です。出馬表から式別を選び直してから **購入予定に追加** してください。
  forward_blocked: ❌ ここからは進めません。
  unit_edit_blocked: ❌ いまは金額を変えられません。式別と馬番の選択を完了してください。
  no_tickets_data: ❌ 購入予定に **払戻用データ** がありません。出馬表から該当レースを開き直し、式別を選び直して **購入予定に追加** し直してください。
  bp_short_confirm: |-
    ❌ **bp が不足**しています（必要 **{{need}}** bp / 残高 **{{bal}}** bp）。
    /boting の **Dailyをもらう** で受け取るか、購入予定を減らす・1点あたりの金額を下げてください。
  db_save_failed: "❌ **データベースへの保存に失敗しました**（bp の減算・購入記録は行われていません）。ホストのディスク空きやネットワークを確認し、しばらくしてから再度お試しください。\n`{{detail}}`"
  purchase_failed_generic: ❌ 購入を完了できませんでした。
  purchase_bp_short: ❌ **bp が不足**しています（必要 **{{need}}** bp / 残高 **{{bal}}** bp）。
  purchase_bad_tickets: ❌ 購入予定データが不正です。出馬表からやり直し、**購入予定に追加** し直してください。
  purchase_bad_race: ❌ レースIDの形式が不正です。出馬表から開き直し、**購入予定に追加** し直してください。
  purchase_bad_points: ❌ 点数が不正です。出馬表からやり直してください。
  purchase_empty: ❌ 購入対象がありません。
slip_confirm:
  closed_warn_intro: ⚠️ **発売が締め切られている購入予定があるため、この内容では確定できません。**
  closed_warn_mid: 次の行は、発売終了・発走済み、または結果確定と判定されています。
  closed_warn_footer: "**締切分のみ削除**でこれらだけを一覧から外します。残りがあれば、もう一度 **この内容で確定** を押してください。"
  line_item: |-
    {{i}}. **{{title}}**
    └ {{sel}}
  race_fallback: レース
  unknown_pick: (内容不明)
  btn_remove_closed: 締切分のみ削除
  btn_back_review: 確認画面に戻る
  all_closed_removed: ✅ 表示されていた購入予定はすべて発売締切のため一覧から外しました。/boting から購入予定を追加し直せます。
add_to_cart_done: |-
  ✅ 購入予定に追加しました（保存: **{{count}}**件）

  同じレースで別の式別を選ぶか、他レースから追加できます。**購入予定** ボタンで一覧・まとめて確認できます。
purchase_done:
  line1_suffix: "**購入完了** −**{{spent}}** bp（残高 **{{balance}}** bp）"
  line2: レース結果が出たら /boting の馬券購入メニューや開催メニューで結果を表示すると、netkeiba の払戻に基づき bp が自動加算されます。
