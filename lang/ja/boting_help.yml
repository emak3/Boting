title: "## ヘルプ"
overview_intro: |-
  実馬券の種類・ルールは JRA の公式ページから。**券種の発売可否（出走頭数）**はその公式表に合わせ、中央(JRA)・地方(NAR)のどちらでも同じルールで絞り込みます（実際の地方の発売と異なる場合があります）。ライブ配信は下の**地域タブ**で場所を選ぶと YouTube の公式チャンネルへ飛べます。
