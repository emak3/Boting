# develop へ push するたび、main 向けの PR が無ければ自動で作成する。
# main は直接 push せず、PR マージのみにすると履歴と品質を揃えやすい。
#
# PR 作成で「GitHub Actions is not permitted to create or approve pull requests」と出る場合:
#   リポジトリ Settings → Actions → General → Workflow permissions で
#   「Allow GitHub Actions to create and approve pull requests」を有効にする。
#   組織ポリシーで不可なら、Fine-grained PAT（Contents+Pull requests）を
#   リポジトリシークレット PR_CREATE_TOKEN に入れ、下記 env がそれを使う。
name: Open PR develop → main

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  ensure-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure open pull request to main
        env:
          # 既定トークンはリポジトリ設定で PR 作成が禁止されていることがある。そのときは PR_CREATE_TOKEN を設定。
          GH_TOKEN: ${{ secrets.PR_CREATE_TOKEN || github.token }}
        run: |
          set -e
          count=$(gh pr list --repo "${{ github.repository }}" --base main --head develop --state open --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "Open PR from develop to main already exists."
            exit 0
          fi
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head develop \
            --title "develop → main" \
            --body "develop の変更を main に取り込みます。レビュー後にマージしてください。"
